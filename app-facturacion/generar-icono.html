<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generar Icono</title>
    <style>
        #icono {
            width: 512px;
            height: 512px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 100px;
            font-size: 280px;
            color: white;
        }
    </style>
</head>
<body>
    <div id="icono">📋</div>
    <button onclick="descargar()">Descargar Icono</button>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        function descargar() {
            html2canvas(document.getElementById('icono')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'icon-512.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
